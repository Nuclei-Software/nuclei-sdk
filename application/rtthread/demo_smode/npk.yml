## Package Base Information
name: app-nsdk_rtthread_smode_demo
owner: nuclei
version:
description: S-Mode RTThread Task Demo
type: app
keywords:
  - rtthread
  - task demo
  - tee
category: rtthread application
license:
homepage:

## Package Dependency
dependencies:
  - name: sdk-nuclei_sdk
    version:
  - name: osp-nsdk_rtthread
    version:

## Package Configurations
configuration:
  app_commonflags:
    # SMODE_RTOS is required and S-Mode is required
    # SSTC could be optional, but we recommended for tee scenario
    # REQUIRE: SMODE, ECLIC, SYSTIMER
    # OPTIONAL: SSTC
    value: -O3 -DSMODE_RTOS -DXLCFG_SMODE=1 -DXLCFG_SSTC=1
    type: text
    description: Application Compile Flags

## Set Configuration for other packages
setconfig:
  - config: rtthread_msh
    value: 0

## Source Code Management
codemanage:
  copyfiles:
    - path: ["*.c", "*.h"]
  incdirs:
    - path: ["./"]
  libdirs:
  ldlibs:
    - libs:

## Build Configuration
buildconfig:
  - type: common
    common_flags: # flags need to be combined together across all packages
      - flags: ${app_commonflags}
