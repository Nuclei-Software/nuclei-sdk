## Package Base Information
name: app-nsdk_demo_smode_clint
owner: nuclei
description: S-Mode Clint Interrupt Demo
type: app
keywords:
  - app
  - risc-v
  - clint
  - sstc
license:
homepage:

## Package Dependency
dependencies:
  - name: sdk-nuclei_sdk
    version:

## Package Configurations
configuration:
  app_commonflags:
    # REQUIRE: SSTC, PMP, SYSTIMER
    value: -DXLCFG_SSTC
    type: text
    description: Application Compile Flags

## Set Configuration for other packages
setconfig:
  # Disable ECLIC v2 hardware context auto save and restore
  # for CLINT/PLIC interrupt mode
  - config: eclic_hwctx
    value: 0

## Source Code Management
codemanage:
  copyfiles:
    - path: ["*.c", "*.h"]
  incdirs:
    - path: ["./"]
  libdirs:
  ldlibs:
    - libs: [""]

## Build Configuration
buildconfig:
  - type: common
    common_flags: # flags need to be combined together across all packages
      - flags: ${app_commonflags}
