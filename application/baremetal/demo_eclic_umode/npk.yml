## Package Base Information
name: app-nsdk_demo_eclic_umode
owner: nuclei
version:
description: U-Mode Application with M-Mode ECLIC Interrupt Handling
type: app
keywords:
  - baremetal
  - riscv eclic
  - umode
category: baremetal application
license:
homepage:

## Package Dependency
dependencies:
  - name: sdk-nuclei_sdk
    version:

## Package Configurations
configuration:
  app_commonflags:
    # REQUIRE: ECLIC, SYSTIMER, PMP
    # OPTIONAL: SMPU
    value: -DXLCFG_SMPU=1
    type: text
    description: Application Compile Flags

## Set Configuration for other packages
setconfig:


## Source Code Management
codemanage:
  copyfiles:
    - path: ["*.c", "*.h"]
  incdirs:
    - path: ["./"]
  libdirs:
  ldlibs:
    - libs:

## Build Configuration
buildconfig:
  - type: common
    common_flags: # flags need to be combined together across all packages
      - flags: ${app_commonflags}
