## Package Base Information
name: app-nsdk_demo_eclic_stress
owner: nuclei
description: ECLIC Interrupt Stress Test Demo for Nuclei RISC-V processors
type: app
keywords:
  - baremetal
  - eclic
category: baremetal application
license: Apache-2.0
homepage:

## Package Dependency
dependencies:
  - name: sdk-nuclei_sdk
    version:

## Package Configurations
configuration:
  # place intstack before app_commonflags for better nuclei studio
  # project wizard rendering
  intstack:
    default_value: 0
    type: checkbox
    tips: "If enabled, it will enable separated interrupt/exception stack, only valid for ECLICv2"
    description: Separated Trap Stack
  app_commonflags:
    # REQUIRE: ECLIC, SYSTIMER
    # OPTIONAL: SSTC
    value: -O3 -DXLCFG_SSTC=1
    tips: "If you don't have S-Mode or SSTC, you can remove -DXLCFG_SSTC"
    type: text
    description: Application Compile Flags

## Set Configuration for other packages
setconfig:

## Source Code Management
codemanage:
  copyfiles:
    - path: ["*.c", "*.h"]
  incdirs:
    - path: ["./"]
  libdirs:
  ldlibs:
    - libs:

## Build Configuration
buildconfig:
  - type: common
    common_flags: # flags need to be combined together across all packages
      - flags: ${app_commonflags}
    common_defines:
      - defines: INTSTACK=1
        condition: $( ${intstack} == 1 )
