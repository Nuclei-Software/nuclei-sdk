## Package Base Information
name: app-nsdk_demo_smpcc
owner: nuclei
version:
description: SMP & Cluster Cache Demo
type: app
keywords:
  - baremetal
  - smpcc
category: baremetal application
license:
homepage:

## Package Dependency
dependencies:
  - name: sdk-nuclei_sdk
    version:

## Package Configurations
configuration:
  app_commonflags:
    # REQUIRE: SMPCC
    # OPTIONAL: CCM, HPM-v2
    value: -O2 -DXLCFG_CCM=1 -DXLCFG_HPM=2
    type: text
    description: Application Compile Flags
  max_l2_size:
    default_value: 1MB
    type: choice
    description: Set Max L2 Cache Size
    choices:
      - name: 512KB
        description: Max L2 Cache Size is 512KB
      - name: 1MB
        description: Max L2 Cache Size is 1MB
      - name: 2MB
        description: Max L2 Cache Size is 2MB
      - name: 4MB
        description: Max L2 Cache Size is 4MB

## Set Configuration for other packages
setconfig:
  - config: download_mode
    value: ddr
  - config: nuclei_cache
    value: ["ic", "dc", "ccm"]


## Source Code Management
codemanage:
  copyfiles:
    - path: ["*.c", "*.h"]
  incdirs:
    - path: ["./"]
  libdirs:
  ldlibs:
    - libs:

## Build Configuration
buildconfig:
  - type: common
    common_flags: # flags need to be combined together across all packages
      - flags: ${app_commonflags}
    cdefines:
      - defines: MAX_L2_SIZE_KB=512
        condition: $(contains(${max_l2_size}, "512KB"))
      - defines: MAX_L2_SIZE_KB=1024
        condition: $(contains(${max_l2_size}, "1MB"))
      - defines: MAX_L2_SIZE_KB=2048
        condition: $(contains(${max_l2_size}, "2MB"))
      - defines: MAX_L2_SIZE_KB=4096
        condition: $(contains(${max_l2_size}, "4MB"))
