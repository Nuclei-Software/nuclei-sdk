## Package Base Information
name: app-nsdk_demo_ecc
owner: nuclei
version:
description: ECC Error Injection Demo
type: app
keywords:
  - baremetal
  - ecc
category: baremetal application
license:
homepage:

## Package Dependency
dependencies:
  - name: sdk-nuclei_sdk
    version:

## Package Configurations
configuration:
  app_commonflags:
    # REQUIRE: ECC
    # OPTIONAL: CCM, PMA, ICACHE, DCACHE, SMPCC
    # undefine XLCFG_ECC to keep same behavior as Makefile
    value: -O2 -DXLCFG_CCM=1
    type: text
    description: Application Compile Flags

## Set Configuration for other packages
setconfig:
  - config: download_mode
    value: ddr

## Source Code Management
codemanage:
  copyfiles:
    - path: ["*.c", "*.h"]
  incdirs:
    - path: ["./"]
  libdirs:
  ldlibs:
    - libs:

## Build Configuration
buildconfig:
  - type: common
    common_flags: # flags need to be combined together across all packages
      - flags: ${app_commonflags}
    cdefines:
